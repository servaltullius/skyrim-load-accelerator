[General]
; Enable logging to Documents/My Games/Skyrim Special Edition/SKSE/SkyrimLoadAccelerator.log
bEnableLogging = 1
; Log performance benchmarks for each optimization module
bEnableBenchmark = 0

[Decompression]
; Replace zlib inflate with libdeflate (~3x faster decompression)
bReplaceZlib = 1
; Upgrade LZ4 decompression to latest optimized version
bUpgradeLZ4 = 1

[Memory]
; Replace CRT malloc with mimalloc (disable if using SSE Engine Fixes TBBMalloc)
bReplaceMalloc = 0

[FileIO]
; Cache INI file reads in memory (disable if using PrivateProfileRedirector)
bCacheINI = 1
; Increase max open file handles to 8192
bMaxStdio = 1
iMaxStdioLimit = 8192
; Add FILE_FLAG_SEQUENTIAL_SCAN hint for BSA/BA2 files
bSequentialScan = 1

[Caching]
; Cache TESForm lookups (disable if using SSE Engine Fixes FormCaching)
bFormCache = 0

[Threading]
; Decompress BSA blocks in parallel
bParallelBSA = 1
; Thread pool size (0 = auto, uses hardware_concurrency - 1)
iThreadPoolSize = 0
